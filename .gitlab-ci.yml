# GitLab CI — build the static cruise map and publish it to GitLab Pages.
#
# The build regenerates site/data/ from live sources each run (drifter share,
# CMEMS, SPASSO FTLE); site/data/ is git-ignored, so the build MUST run in CI — a
# plain file copy would publish a dataless map.
#
# GitLab Pages serves the `public/` directory produced by a job named `pages`, so
# the job builds into site/ then copies it to public/.
#
# CMEMS currents/speed/forecast need a copernicusmarine login, supplied as masked
# CI/CD variables COPERNICUSMARINE_SERVICE_USERNAME / COPERNICUSMARINE_SERVICE_PASSWORD
# (Settings → CI/CD → Variables). Without them the build degrades to positions +
# FTLE (both public), exactly as on GitHub.
#
# Cadence: add a scheduled pipeline under Settings → CI/CD → Pipeline schedules
# (GitLab schedules are configured in the UI, not this file, and are not subject
# to GitHub's high-frequency-cron dropping).

pages:
  image: debian:bookworm-slim
  variables:
    PIXI_HOME: "$CI_PROJECT_DIR/.pixi-home"     # pixi binary (on PATH below)
    PIXI_CACHE_DIR: "$CI_PROJECT_DIR/.pixi-cache" # package cache, kept in-project so it can be cached
  cache:
    key: "pixi-$CI_COMMIT_REF_SLUG"
    paths:
      - .pixi-cache/
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends curl ca-certificates
    - curl -fsSL https://pixi.sh/install.sh | bash
    - export PATH="$PIXI_HOME/bin:$PATH"
  script:
    - pixi run build
    - rm -rf public && cp -r site public
  artifacts:
    paths:
      - public
  rules:
    # Publish only from the default branch. Push, scheduled, and manual ("web")
    # pipelines all run on the default branch and so match; merge-request
    # pipelines (no CI_COMMIT_BRANCH) do not deploy.
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"

# Faster alternative, if the runner can reach ghcr.io: use the official pixi
# image and drop the install. Replace the `image` and `before_script` above with:
#   image: ghcr.io/prefix-dev/pixi:latest
#   before_script: []
