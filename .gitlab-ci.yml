# GitLab CI — type-check the static map's ES modules.
#
# This repo NO LONGER deploys from CI. The site (and the forecast API) are built on a
# cadence and served by the OpenShift "whirlsview" stack in the sibling `oc_gateway`
# repo (see README.md / docs/hosting.md); GitLab Pages is retired.
#
# What remains is a guard: `pixi run check-frontend` (tsc --checkJs over site/map) fails
# the pipeline on ANY TypeScript error — the ReferenceError-blank-page risk of the
# no-bundler ES-module split (see tsconfig.json). tsc exits non-zero on any error, so a
# green pipeline means a clean type check.

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH

check-frontend:
  image: debian:bookworm-slim
  variables:
    PIXI_HOME: "$CI_PROJECT_DIR/.pixi-home"       # pixi binary (on PATH below)
    PIXI_CACHE_DIR: "$CI_PROJECT_DIR/.pixi-cache"  # package cache, kept in-project so it can be cached
  cache:
    key: "pixi-$CI_COMMIT_REF_SLUG"
    paths:
      - .pixi-cache/
  before_script:
    # git is required at solve time, not just for the checkout: pixi.toml pulls
    # `parcels` straight from a git ref, so resolving the default environment shells
    # out to git before any task runs.
    - apt-get update && apt-get install -y --no-install-recommends curl ca-certificates git
    - curl -fsSL https://pixi.sh/install.sh | bash
    - export PATH="$PIXI_HOME/bin:$PATH"
  script:
    - pixi run check-frontend

# Faster alternative, if the runner can reach ghcr.io: use the official pixi image and
# drop the install. Replace the `image` and `before_script` above with:
#   image: ghcr.io/prefix-dev/pixi:latest
#   before_script: []
