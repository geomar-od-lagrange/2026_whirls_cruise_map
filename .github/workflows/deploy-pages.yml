name: Build & deploy site

# Builds the static cruise map (site/data is generated here, not committed) and
# publishes site/ to GitHub Pages. The build pulls live data each run, so we
# rebuild on a schedule to keep drifter positions, currents and forecast fresh,
# in addition to on every push to main and on manual dispatch.
on:
  push:
    branches: [main]
  schedule:
    # Hourly. Tighten (e.g. "*/30 * * * *") once CI runtimes are known to allow
    # it; GitHub may delay scheduled runs under load.
    - cron: "0 * * * *"
  workflow_dispatch:

# Least-privilege token: read the repo, deploy Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; never cancel an in-flight deploy (scheduled and push
# runs can overlap).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          # pixi.lock is committed → reproducible env, cached across runs.
          cache: true

      - name: Build site data
        # CMEMS currents/speed/forecast need a copernicusmarine login; without
        # these secrets those layers are skipped and positions + FTLE (both
        # public) still build. Add the secrets under Settings → Secrets and
        # variables → Actions to enable the current-driven layers.
        env:
          COPERNICUSMARINE_SERVICE_USERNAME: ${{ secrets.COPERNICUSMARINE_SERVICE_USERNAME }}
          COPERNICUSMARINE_SERVICE_PASSWORD: ${{ secrets.COPERNICUSMARINE_SERVICE_PASSWORD }}
        run: pixi run build

      - uses: actions/configure-pages@v6
        with:
          # Enable Pages (source = GitHub Actions) on the first run.
          enablement: true

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
