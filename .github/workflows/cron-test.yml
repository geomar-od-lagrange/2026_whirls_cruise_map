name: cron-test (diagnostic)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - run: date -u +"cron-test fired at %Y-%m-%dT%H:%M:%SZ"
