<!doctype html>
<!--
  Root entry point. The map lives at ./map/ and the dataset downloads at ./data/.
  The relative meta-refresh below is the sole redirect to the map. Because it is
  relative it resolves against whatever base the site is served under, so it works
  at a namespace subpath (…/<project>/, the live GitLab Pages layout), at a domain
  root, and under a plain local `python -m http.server`. We deliberately avoid a
  GitLab Pages `_redirects` rule: its target resolves from the domain root, so a
  `/map/` there breaks the moment the site is served under a subpath. See
  docs/deploy.md.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="refresh" content="0; url=./map/" />
    <title>Whirls cruise map</title>
  </head>
  <body>
    <p>Redirecting to the <a href="./map/">cruise map</a>&hellip;</p>
  </body>
</html>
