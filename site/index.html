<!doctype html>
<!--
  Root entry point. The map lives at /map/ and the dataset downloads at /data/.
  GitLab Pages redirects / -> /map/ via the sibling `_redirects` file (a clean
  302); this meta-refresh is the belt-and-suspenders fallback and also makes the
  local `python -m http.server` dev server (which ignores `_redirects`) land on
  the map. See plans/018-ingest-derive-data-seam.md.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="refresh" content="0; url=./map/" />
    <title>Whirls cruise map</title>
  </head>
  <body>
    <p>Redirecting to the <a href="./map/">cruise map</a>&hellip;</p>
  </body>
</html>
